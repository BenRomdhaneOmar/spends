spring:
  application:
    name: spends-test
  threads:
    virtual:
      enabled: true
  aot:
    enabled: false
server:
  port: 0
management:
  endpoints:
    enabled-by-default: false
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
scalar:
  enabled: false
settings:
  defaultLanguageCode: en
spends:
  queries:
    language: language
  headers:
    count: spends_count
    errors:
      messages: errors_messages
      codes: errors_codes